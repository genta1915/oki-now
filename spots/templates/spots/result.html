{% load static %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>おすすめスポット</title>
</head>

<body>
    <h1>おすすめスポット</h1>

    {% for spot in spots %}
    <h2>{{ spot.name }}</h2>
    <img src="{% static spot.image %}" alt="{{ spot.name }}" width="400">
    {% endfor %}

    <a href="/">ホームへ戻る</a>
</body>

</html>
