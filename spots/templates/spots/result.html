{% load static %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>おすすめスポット</title>

    <style>
        .map-button {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 8px;
        }

        .map-button:hover {
            background-color: #27ae60;
        }
    </style>
</head>

<body>
    <h1>おすすめスポット</h1>

    {% for spot in spots %}
    <h2>{{ spot.name }}</h2>

    <p>{{ spot.description }}</p>

    <img src="{% static spot.image %}" alt="{{ spot.name }}" width="400">

    <br>

    <a href="{{ spot.map_url }}" target="_blank" class="map-button">
        📍 Googleマップで見る
    </a>

    <br><br>
    {% endfor %}

    <a href="/">ホームへ戻る</a>
</body>

</html>
