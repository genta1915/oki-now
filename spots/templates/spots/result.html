{% load static %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>おすすめスポット</title>

    <style>
        h1 {
            text-align: center;
        }

        body {
            background-color: #dff4ff;
        }

        .map-button {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 8px;
        }

        .map-button:hover {
            background-color: #27ae60;
        }

        img {
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .spot-card {
            max-width: 850px;
            margin: 0 auto 30px auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;

        }
    </style>
</head>

<body>
    <h1>おすすめスポット</h1>

    {% for spot in spots %}
    <div class="spot-card">

        <h2>{{ spot.name }}</h2>

        <p>{{ spot.description }}</p>

        <img src="{% static spot.image %}" alt="{{ spot.name }}" width="600">

        <br>

        <a href="{{ spot.map_url }}" target="_blank" class="map-button">
            📍 Googleマップで見る
        </a>

    </div>
    {% endfor %}

    <a href="/">ホームへ戻る</a>
</body>

</html>
