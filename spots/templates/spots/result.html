{% load static %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>おすすめスポット</title>
</head>

<body>
    <h1>おすすめスポット</h1>

    {% for spot in spots %}
    <h2>{{ spot.name }}</h2>

    <p>{{ spot.description }}</p>

    <img src="{% static spot.image %}" alt="{{ spot.name }}" width="400">

    <br>

    <a href="{{ spot.map_url }}" target="_blank">
        Googleマップで見る
    </a>

    <br><br>
    {% endfor %}

    <a href="/">ホームへ戻る</a>
</body>

</html>
